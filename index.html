<!DOCTYPE html>
<html>
<head>
    <title>Hey Jennie ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe6eb;
            font-family: Arial;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 26px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        #meBtn {
            background: #ff4d6d;
            color: white;
        }

        #youBtn {
            background: #ddd;
            position: absolute;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Who's more cute? 😌</h1>

    <button id="meBtn" onclick="goNext()">Shubh's Kiddo ❤️</button>
    <button id="youBtn">Shubh 😏</button>
</div>

<script>

/* moving button */
let youBtn = document.getElementById("youBtn");

youBtn.addEventListener("mouseover", () => {
    let x = Math.random() * window.innerWidth - 100;
    let y = Math.random() * window.innerHeight - 50;

    youBtn.style.left = x + "px";
    youBtn.style.top = y + "px";
});

/* go to main project */
function goNext() {
    window.location.href = "main.html";
}

</script>

</body>
</html>
