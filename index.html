<!DOCTYPE html>
<html>
<head>
<title>For Jennie ❤️</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to bottom, #000000, #1a1a1a);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

.container {
    text-align: center;
    max-width: 600px;
    padding: 30px;
}

/* hidden initially */
#mainContent {
    display: none;
}

h1 {
    font-size: 32px;
}

.msg {
    display: none;
    font-size: 18px;
    line-height: 1.6;
    animation: fadeIn 1s ease;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    background: #ff6b81;
    border: none;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
    position: relative;
}

button:hover {
    background: #ff4757;
    transform: scale(1.05);
}

#noBtn {
    position: absolute;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* hearts */
.heart {
    position: absolute;
    color: #ff6b81;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

    <!-- INTRO SCREEN -->
    <div id="intro">
        <h1>Who’s more cute? 😏</h1>
        <button onclick="startStory()">Me 😎</button>
        <button id="noBtn">You 😏</button>
    </div>
  <!-- AUDIO -->
  <audio id="bgMusic" loop>
    <source src="bachelor-adiye-lyric-video-gv_FsuMAwyB.mp3" type="audio/mp3">
    Your browser does not support the audio element.
  </audio>
    <!-- MAIN CONTENT -->
    <div id="mainContent">

        <h1 id="typing"></h1>

        <div id="message1" class="msg" style="display:block;">
            <h1>Jennie… do you remember how it all started?</h1>
            <p>Your full story here...</p>
        </div>

        <div id="message2" class="msg">
            <h1>You stayed… and that changed everything</h1>
            <p>Second page content...</p>
        </div>

        <!-- keep your other message3,4,5,6 same -->

        <div class="buttons">
            <button onclick="next()">Next ❤️</button>
        </div>

    </div>

</div>

<script>

/* move button */
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

/* start story */
function startStory() {
      document.getElementById("intro").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      typeWriter();
      let music = document.getElementById("bgMusic");
      music.play();
    }

/* typing */
let text = "Hey Jennie ❤️";
let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 80);
    }
}

/* story */
let current = 1;

function next() {
    document.getElementById("message" + current).style.display = "none";
    current++;

    let nextMsg = document.getElementById("message" + current);
    if (nextMsg) {
        nextMsg.style.display = "block";
        window.scrollTo({ top: 0, behavior: "smooth" });
    }
}

/* hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 400);

</script>

</body>
</html>
